<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aqua Clean — Payslip Lookup</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root{
    --bg: #F3F8F8;
    --surface: #FFFFFF;
    --surface-2: #EAF3F3;
    --ink: #0E2226;
    --ink-soft: #4C6468;
    --teal: #0E7C86;
    --teal-deep: #0A5B63;
    --aqua: #17B6C4;
    --border: #D9E7E8;
    --success: #1F9D66;
    --danger: #C24B3B;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(14,34,38,0.04), 0 8px 24px rgba(14,34,38,0.06);
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    background: var(--bg);
    background-image:
      radial-gradient(circle at 12% -10%, rgba(23,182,196,0.10), transparent 45%),
      radial-gradient(circle at 90% 0%, rgba(14,124,134,0.08), transparent 40%);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrap{
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 20px 80px;
  }

  header.top{
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap:14px;
    margin-bottom: 36px;
  }

  .logo-img{
    height: 36px;
    width: auto;
    object-fit: contain;
    display:block;
    flex-shrink: 0;
  }

  .brand{
    text-align:center;
    flex: 1;
    min-width: 0;
  }
  .brand h1{
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight:800;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .brand p{
    font-size: 12.5px;
    color: var(--ink-soft);
    margin-top: 2px;
    letter-spacing: 0.01em;
  }

  .search-shell{
    position: relative;
  }

  .search-box{
    position: relative;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .search-box:focus-within{
    border-color: var(--teal);
    box-shadow: 0 0 0 4px rgba(14,124,134,0.10), var(--shadow);
  }

  .search-box svg{
    position:absolute;
    left: 18px; top: 50%;
    transform: translateY(-50%);
    width: 20px; height: 20px;
    stroke: var(--ink-soft);
  }

  #q{
    width: 100%;
    border: none;
    background: transparent;
    outline: none;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-size: 16.5px;
    font-weight: 500;
    color: var(--ink);
    padding: 18px 50px 18px 50px;
  }
  #q::placeholder{ color: #9AAEB1; font-weight: 400; }

  .clear-btn{
    position:absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    width: 30px; height: 30px;
    border-radius: 8px;
    border: none;
    background: var(--surface-2);
    color: var(--ink-soft);
    font-size: 16px;
    cursor: pointer;
    display: none;
    align-items:center;
    justify-content:center;
  }
  .clear-btn.show{ display:flex; }
  .clear-btn:hover{ background: #DFEAEA; }

  .meta-row{
    display:flex;
    justify-content: space-between;
    align-items:center;
    margin-top: 12px;
    padding: 0 4px;
    font-size: 12.5px;
    color: var(--ink-soft);
    min-height: 18px;
  }
  .meta-row .count b{ color: var(--teal-deep); font-weight: 700; }

  #results{
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .row{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 12px;
    transition: border-color .12s ease, box-shadow .12s ease;
    animation: rise .14s ease both;
  }
  .row:hover{
    border-color: var(--teal);
    box-shadow: var(--shadow);
  }

  .row.copied{
    border-color: var(--success);
    background: #F1FBF6;
  }

  @keyframes rise{
    from{ opacity:0; transform: translateY(4px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .row-left{ min-width:0; }

  .name{
    font-weight: 600;
    font-size: 15px;
    color: var(--ink);
    white-space: nowrap;
    overflow:hidden;
    text-overflow: ellipsis;
  }
  .name mark, .idchip mark{
    background: rgba(23,182,196,0.22);
    color: var(--teal-deep);
    border-radius: 3px;
    padding: 0 1px;
  }

  .chips{
    display:flex;
    gap: 6px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .idchip{
    font-family: ui-monospace, SFMono-Regular, 'Courier New', monospace;
    font-size: 11.5px;
    font-weight: 500;
    color: var(--teal-deep);
    background: var(--surface-2);
    border-radius: 6px;
    padding: 3px 7px;
    letter-spacing: 0.01em;
  }
  .idchip.uid{ color: var(--teal-deep); }

  .copy-btn{
    flex-shrink:0;
    display:flex;
    align-items:center;
    gap: 6px;
    background: var(--teal);
    color: #fff;
    border: none;
    border-radius: 9px;
    padding: 9px 14px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background .12s ease;
    white-space: nowrap;
  }
  .copy-btn:hover{ background: var(--teal-deep); }
  .row.copied .copy-btn{ background: var(--success); }
  .copy-btn svg{ width:14px; height:14px; }

  .empty, .hint{
    text-align:center;
    padding: 56px 16px;
    color: var(--ink-soft);
  }
  .empty .big{
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .hint .droplet{
    width: 34px; height: 34px;
    margin: 0 auto 14px;
    border-radius: 0 60% 60% 60%;
    transform: rotate(45deg);
    background: linear-gradient(155deg, var(--aqua), var(--teal));
    opacity: 0.35;
  }

  footer{
    text-align:center;
    margin-top: 40px;
    font-size: 11.5px;
    color: #8BA0A3;
  }

  .toast{
    position: fixed;
    left: 50%;
    bottom: 28px;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: #fff;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 500;
    display:flex;
    align-items:center;
    gap: 8px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease, transform .2s ease;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    z-index: 10;
  }
  .toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast svg{ width:16px; height:16px; stroke: var(--aqua); flex-shrink:0; }

  @media (max-width: 480px){
    .wrap{ padding: 32px 14px 60px; }
    .row{ flex-direction: column; align-items: flex-start; }
    .copy-btn{ width: 100%; justify-content:center; margin-top: 2px; }
    .logo-img{ height: 26px; }
    .brand h1{ font-size: 15.5px; }
    .brand p{ font-size: 10.5px; }
  }

  @media (prefers-reduced-motion: reduce){
    .row{ animation: none; }
    .toast{ transition: none; }
  }

  /* Lock screen */
  .lock-screen{
    min-height: 100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 20px;
  }
  .lock-card{
    width: 100%;
    max-width: 340px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 34px 30px 28px;
    text-align:center;
  }
  .lock-card h2{
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight:800;
    font-size: 19px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .lock-card p{
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 22px;
  }
  .lock-card form{
    display:flex;
    flex-direction:column;
    gap: 10px;
  }
  .lock-card input{
    width:100%;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 15px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    outline:none;
    text-align:center;
    letter-spacing: 0.02em;
    transition: border-color .15s ease;
  }
  .lock-card input:focus{ border-color: var(--teal); }
  .lock-card button{
    background: var(--teal);
    color:#fff;
    border:none;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14.5px;
    font-weight: 600;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    cursor:pointer;
    transition: background .12s ease;
  }
  .lock-card button:hover{ background: var(--teal-deep); }
  .lock-error{
    display:none;
    margin-top: 14px;
    font-size: 12.5px;
    color: var(--danger);
    font-weight: 500;
  }
  .lock-error.show{ display:block; }

  footer a{
    color: var(--teal-deep);
    text-decoration: none;
    font-weight: 600;
  }
  footer a:hover{ text-decoration: underline; }
  footer .credit{
    margin-top: 6px;
    color: #A9BABC;
    font-size: 11px;
  }
</style>
</head>

<script>
/* ---- Access lock: password + 5-day session ---- */
(function(){
  const PASSWORD = "samad";
  const SESSION_KEY = "aquaclean_session_expiry";
  const SESSION_LENGTH_MS = 5 * 24 * 60 * 60 * 1000; // 5 days

  const lockScreen = document.getElementById('lockScreen');
  const mainApp = document.getElementById('mainApp');
  const lockForm = document.getElementById('lockForm');
  const pwInput = document.getElementById('pw');
  const lockError = document.getElementById('lockError');

  function isSessionValid(){
    const expiry = localStorage.getItem(SESSION_KEY);
    if(!expiry) return false;
    return Date.now() < parseInt(expiry, 10);
  }

  function grantAccess(){
    localStorage.setItem(SESSION_KEY, String(Date.now() + SESSION_LENGTH_MS));
    lockScreen.style.display = 'none';
    mainApp.style.display = '';
    document.getElementById('q') && document.getElementById('q').focus();
  }

  function showLock(){
    localStorage.removeItem(SESSION_KEY);
    mainApp.style.display = 'none';
    lockScreen.style.display = 'flex';
    pwInput.value = '';
    pwInput.focus();
  }

  if(isSessionValid()){
    lockScreen.style.display = 'none';
    mainApp.style.display = '';
  }else{
    showLock();
  }

  lockForm.addEventListener('submit', function(e){
    e.preventDefault();
    if(pwInput.value === PASSWORD){
      lockError.classList.remove('show');
      grantAccess();
    }else{
      lockError.classList.add('show');
      pwInput.value = '';
      pwInput.focus();
    }
  });

  const logoutLink = document.getElementById('logoutLink');
  if(logoutLink){
    logoutLink.addEventListener('click', function(e){
      e.preventDefault();
      showLock();
    });
  }
})();

const TOTAL = DATA.length;

const qInput = document.getElementById('q');
const resultsEl = document.getElementById('results');
const clearBtn = document.getElementById('clearBtn');
const countLabel = document.getElementById('countLabel');
const totalLabel = document.getElementById('totalLabel');
const toast = document.getElementById('toast');
const toastText = document.getElementById('toastText');

totalLabel.textContent = TOTAL + ' employees';

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlight(text, term){
  if(!term) return escapeHtml(text);
  const idx = text.toUpperCase().indexOf(term);
  if(idx === -1) return escapeHtml(text);
  return escapeHtml(text.slice(0, idx)) + '<mark>' + escapeHtml(text.slice(idx, idx+term.length)) + '</mark>' + escapeHtml(text.slice(idx+term.length));
}

function buildMessage(emp){
  const link = 'https://aquaclean-qatar.github.io/payslip';
  return `Aqua Clean Payslip
Dear ${emp.name} (EMP ID: ${emp.id}),
Your payslip is now available.
To view your payslip, 
click: ${link}
UID: ${emp.uid}
⚠️ For your security, never share your UID with anyone.`;
}

function score(emp, term){
  const name = emp.name.toUpperCase();
  const id = emp.id.toUpperCase();
  const uid = emp.uid.toUpperCase();
  if(id === term || uid === term) return 0;
  if(name.startsWith(term)) return 1;
  if(id.startsWith(term) || uid.startsWith(term)) return 2;
  const nameWordStart = (' ' + name).includes(' ' + term);
  if(nameWordStart) return 3;
  return 4;
}

function search(term){
  term = term.trim().toUpperCase();
  if(!term){
    return { term, matches: [] };
  }
  const matches = [];
  for(let i=0;i<DATA.length;i++){
    const emp = DATA[i];
    if(emp.name.toUpperCase().includes(term) || emp.id.toUpperCase().includes(term) || emp.uid.toUpperCase().includes(term)){
      matches.push(emp);
    }
  }
  matches.sort((a,b) => score(a,term) - score(b,term) || a.name.localeCompare(b.name));
  return { term, matches };
}

function render(){
  const raw = qInput.value;
  clearBtn.classList.toggle('show', raw.length > 0);
  const { term, matches } = search(raw);

  if(!raw.trim()){
    countLabel.textContent = '';
    resultsEl.innerHTML = `
      <div class="hint">
        <div class="droplet"></div>
        <div class="big">Start typing to search</div>
        <div>Look up by employee name, ID, or UID</div>
      </div>`;
    return;
  }

  if(matches.length === 0){
    countLabel.textContent = '0 results';
    resultsEl.innerHTML = `
      <div class="empty">
        <div class="big">No matches for “${escapeHtml(raw)}”</div>
        <div>Check the spelling or try a partial name / ID</div>
      </div>`;
    return;
  }

  countLabel.innerHTML = `<b>${matches.length}</b> result${matches.length===1?'':'s'}`;

  const frag = document.createDocumentFragment();
  matches.forEach((emp, i) => {
    const row = document.createElement('div');
    row.className = 'row';
    row.style.animationDelay = Math.min(i*6, 90) + 'ms';
    row.innerHTML = `
      <div class="row-left">
        <div class="name">${highlight(emp.name, term)}</div>
        <div class="chips">
          <span class="idchip">${highlight(emp.id, term)}</span>
          <span class="idchip uid">${highlight(emp.uid, term)}</span>
        </div>
      </div>
      <button class="copy-btn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        Copy
      </button>
    `;
    const btn = row.querySelector('.copy-btn');
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      copyEmployee(emp, row);
    });
    frag.appendChild(row);
  });
  resultsEl.innerHTML = '';
  resultsEl.appendChild(frag);
}

let toastTimer;
function showToast(msg){
  toastText.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
}

function copyEmployee(emp, rowEl){
  const msg = buildMessage(emp);
  const finish = (ok) => {
    if(ok){
      rowEl.classList.add('copied');
      showToast('Copied payslip message for ' + emp.name.split(' ')[0]);
      setTimeout(() => rowEl.classList.remove('copied'), 1200);
    }else{
      showToast('Copy failed — select text manually');
    }
  };
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(msg).then(() => finish(true)).catch(() => fallbackCopy(msg, finish));
  }else{
    fallbackCopy(msg, finish);
  }
}

function fallbackCopy(text, cb){
  try{
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    cb(ok);
  }catch(e){
    cb(false);
  }
}

qInput.addEventListener('input', render);
clearBtn.addEventListener('click', () => { qInput.value=''; qInput.focus(); render(); });

const yearEl = document.getElementById('curYear');
if(yearEl) yearEl.textContent = new Date().getFullYear();

render();
</script>
